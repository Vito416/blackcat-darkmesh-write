# Minimal Grafana dashboard snippet (YAML) for PSP breaker/retry signals
# Import via grafana-dashboard provisioner or UI "Import from JSON/YAML".
apiVersion: 1
providers:
  - name: "write-psp"
    orgId: 1
    folder: "Blackcat Mesh / Write"
    type: file
    options:
      path: /etc/grafana/dashboards/write-psp-breaker.json

dashboard:
  title: "Write PSP Health"
  tags: ["blackcat", "write", "psp"]
  timezone: browser
  panels:
    - title: "PSP breaker open (by provider)"
      type: timeseries
      datasource: Prometheus
      fieldConfig:
        defaults: { unit: none }
      targets:
        - expr: write_psp_stripe_breaker_open
          legendFormat: stripe
        - expr: write_psp_paypal_breaker_open
          legendFormat: paypal
        - expr: write_psp_gopay_breaker_open
          legendFormat: gopay
    - title: "PSP breaker blocked"
      type: timeseries
      datasource: Prometheus
      targets:
        - expr: rate(write_psp_stripe_breaker_blocked_total[5m])
          legendFormat: stripe blocked/s
        - expr: rate(write_psp_paypal_breaker_blocked_total[5m])
          legendFormat: paypal blocked/s
    - title: "Webhook retries (Stripe/PayPal)"
      type: timeseries
      datasource: Prometheus
      targets:
        - expr: rate(write_webhook_stripe_retry_total[5m])
          legendFormat: stripe retry/s
        - expr: rate(write_webhook_paypal_retry_total[5m])
          legendFormat: paypal retry/s
        - expr: rate(write_webhook_gopay_retry_total[5m])
          legendFormat: gopay retry/s
    - title: "Webhook verify failures"
      type: timeseries
      datasource: Prometheus
      targets:
        - expr: rate(write_webhook_stripe_verify_fail_total[5m])
          legendFormat: stripe verify fail/s
        - expr: rate(write_webhook_paypal_verify_fail_total[5m])
          legendFormat: paypal verify fail/s
        - expr: rate(write_webhook_gopay_verify_fail_total[5m])
          legendFormat: gopay verify fail/s
        - expr: rate(write_webhook_hmac_missing_total[5m])
          legendFormat: hmac missing/s
    - title: "Retry queue depth"
      type: stat
      datasource: Prometheus
      targets:
        - expr: write_webhook_retry_queue
          legendFormat: retry_queue
    - title: "Outbox queue depth"
      type: stat
      datasource: Prometheus
      targets:
        - expr: write_outbox_queue_size
          legendFormat: outbox_queue
    - title: "DLQ size (webhook/outbox)"
      type: stat
      datasource: Prometheus
      targets:
        - expr: write_webhook_dlq_size
          legendFormat: dlq_size
        - expr: write_outbox_dlq_size
          legendFormat: outbox_dlq
    - title: "WAL size (bytes)"
      type: stat
      datasource: Prometheus
      targets:
        - expr: write_wal_bytes
          legendFormat: wal_bytes
    - title: "Webhook retry lag (sec)"
      type: timeseries
      datasource: Prometheus
      fieldConfig:
        defaults: { unit: s }
      targets:
        - expr: write_webhook_retry_lag_seconds
          legendFormat: lag (s)
    - title: "WAL apply duration"
      type: timeseries
      datasource: Prometheus
      fieldConfig:
        defaults: { unit: s }
      targets:
        - expr: avg_over_time(write_wal_apply_duration_seconds[5m])
          legendFormat: avg 5m
        - expr: max_over_time(write_wal_apply_duration_seconds[5m])
          legendFormat: max 5m
    - title: "Idempotency collisions (5m)"
      type: stat
      datasource: Prometheus
      targets:
        - expr: increase(write_idempotency_collisions_total[5m])
          legendFormat: collisions_5m
