name: Secrets Lint

on:
  push:
    paths:
      - "ops/env.prod.example"
      - "ops/verify/secrets_lint.sh"
      - ".github/workflows/secrets-lint.yml"
  pull_request:
    paths:
      - "ops/env.prod.example"
      - "ops/verify/secrets_lint.sh"
      - ".github/workflows/secrets-lint.yml"
  workflow_dispatch: {}

permissions: { contents: read }

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run secrets lint
        run: bash ops/verify/secrets_lint.sh
