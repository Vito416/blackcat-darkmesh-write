name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * *" # nightly hardening run

permissions: { contents: read }

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Static checks
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ARWEAVE_VERIFY_FILE: ${{ secrets.ARWEAVE_VERIFY_FILE || vars.ARWEAVE_VERIFY_FILE }}
      ARWEAVE_VERIFY_TX: ${{ secrets.ARWEAVE_VERIFY_TX || vars.ARWEAVE_VERIFY_TX }}
      ARWEAVE_VERIFY_REF: ${{ secrets.ARWEAVE_VERIFY_REF || vars.ARWEAVE_VERIFY_REF || 'v1.0.0' }}
      ENFORCE_ARWEAVE_HASH: ${{ secrets.ENFORCE_ARWEAVE_HASH || vars.ENFORCE_ARWEAVE_HASH || '0' }}
      RUN_JWT_SPEC: ${{ github.event_name == 'schedule' && '1' || '' }}
      RUN_RATE_SPEC: ${{ github.event_name == 'schedule' && '1' || '' }}
      RUN_SCHEMA_MANIFEST: 1
      WRITE_RATE_STORE_PATH: ${{ github.event_name == 'schedule' && 'dev/write-rate-store.json' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node 24 (for composite/JS actions)
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true

      - name: Install Node dependencies
        run: npm ci

      - name: Install Lua 5.4 + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            lua5.4 liblua5.4-dev luarocks \
            libssl-dev libsodium-dev libsqlite3-dev

      - name: Install rocks (Lua 5.4)
        run: |
          set -euo pipefail
          rocks=(lua-cjson dkjson luv lsqlite3 luaossl luasodium luafilesystem)
          for rock in "${rocks[@]}"; do
            luarocks --lua-version=5.4 install --local "$rock"
          done
          eval "$(luarocks --lua-version=5.4 path)"
          echo "$HOME/.luarocks/bin" >> $GITHUB_PATH
          {
            echo "LUA_PATH=$LUA_PATH"
            echo "LUA_CPATH=$LUA_CPATH"
          } >> "$GITHUB_ENV"

      - name: Install luacheck/stylua
        run: |
          if command -v luarocks >/dev/null 2>&1; then
            luarocks install --local luacheck || true
            luarocks install --local stylua || true
            echo "$HOME/.luarocks/bin" >> $GITHUB_PATH
          else
            echo "luarocks not installed; failing luacheck/stylua install" && exit 1
          fi
          if ! command -v stylua >/dev/null 2>&1; then
            set -euo pipefail
            STYLUA_VERSION=0.20.0
            curl -sSfL \
              "https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux-x86_64.zip" \
              -o /tmp/stylua.zip
            unzip -o /tmp/stylua.zip -d /tmp
            sudo mv /tmp/stylua /usr/local/bin/stylua
            sudo chmod +x /usr/local/bin/stylua
          fi

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.30.0
          GITLEAKS_SHA256=${GITLEAKS_SHA256:-79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e}
          curl --connect-timeout 10 --max-time 30 -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          if [ -n "${GITLEAKS_SHA256}" ]; then
            echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          fi
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Prepare archive for Arweave verify
        if: env.ARWEAVE_VERIFY_FILE != ''
        run: |
          ref="${ARWEAVE_VERIFY_REF:-HEAD}"
          git archive --format=tar.gz -o "$ARWEAVE_VERIFY_FILE" "$ref"

      - name: Preflight (schemas + Lua syntax + fixtures)
        env:
          RUN_BATCH: 1
          RUN_DEPS_CHECK: 1
          RUN_SCHEMA_MANIFEST: 1
          WRITE_REQUIRE_SIGNATURE: 1  # ensure crypto deps present in CI
          WRITE_REQUIRE_SIGNATURE_POLICY: 0
        run: bash scripts/verify/preflight.sh

      - name: Arweave hash verify (main push, best-effort)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main') && env.ARWEAVE_VERIFY_FILE != '' && env.ARWEAVE_VERIFY_TX != ''
        env:
          ARWEAVE_VERIFY_FILE: ${{ env.ARWEAVE_VERIFY_FILE }}
          ARWEAVE_VERIFY_TX: ${{ env.ARWEAVE_VERIFY_TX }}
        run: bash scripts/verify/verify_arweave_hash.sh "$ARWEAVE_VERIFY_FILE" "$ARWEAVE_VERIFY_TX"

      - name: Arweave hash verify (policy enforced)
        if: env.ENFORCE_ARWEAVE_HASH == '1' && github.event_name != 'pull_request'
        env:
          ARWEAVE_VERIFY_FILE: ${{ env.ARWEAVE_VERIFY_FILE }}
          ARWEAVE_VERIFY_TX: ${{ env.ARWEAVE_VERIFY_TX }}
        run: |
          if [ -z "${ARWEAVE_VERIFY_FILE:-}" ] || [ -z "${ARWEAVE_VERIFY_TX:-}" ]; then
            echo "::error::ENFORCE_ARWEAVE_HASH=1 but ARWEAVE_VERIFY_* missing" && exit 1
          fi
          bash scripts/verify/verify_arweave_hash.sh "$ARWEAVE_VERIFY_FILE" "$ARWEAVE_VERIFY_TX"

      - name: Arweave hash verify (optional PR best-effort)
        if: github.event_name == 'pull_request' && env.ARWEAVE_VERIFY_FILE != '' && env.ARWEAVE_VERIFY_TX != ''
        continue-on-error: true
        env:
          ARWEAVE_VERIFY_FILE: ${{ env.ARWEAVE_VERIFY_FILE }}
          ARWEAVE_VERIFY_TX: ${{ env.ARWEAVE_VERIFY_TX }}
        run: bash scripts/verify/verify_arweave_hash.sh "$ARWEAVE_VERIFY_FILE" "$ARWEAVE_VERIFY_TX"

      - name: Arweave hash verify (optional)
        if: github.event_name != 'pull_request' && env.ARWEAVE_VERIFY_FILE != '' && env.ARWEAVE_VERIFY_TX != ''
        env:
          ARWEAVE_VERIFY_FILE: ${{ env.ARWEAVE_VERIFY_FILE }}
          ARWEAVE_VERIFY_TX: ${{ env.ARWEAVE_VERIFY_TX }}
        run: bash scripts/verify/verify_arweave_hash.sh "$ARWEAVE_VERIFY_FILE" "$ARWEAVE_VERIFY_TX"

      - name: Luacheck
        run: |
          if command -v luacheck >/dev/null 2>&1; then
            luacheck ao scripts
          else
            echo "luacheck missing" && exit 1
          fi

      - name: Stylua
        run: |
          if command -v stylua >/dev/null 2>&1; then
            stylua --check ao scripts
          else
            echo "stylua missing" && exit 1
          fi

      - name: Ingest smoke
        env:
          WRITE_REQUIRE_SIGNATURE: 1
          WRITE_REQUIRE_SIGNATURE_POLICY: 0
          WRITE_SIG_TYPE: ed25519
          WRITE_SIG_PRIV_HEX: 4f3c5f2a0d1b4a8c9e6f7d2b3c4e5a6f7b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e
          WRITE_SIG_PUBLIC: hex:65c29ed7228fce639284da05d84fbc37ef736c44ddec2ce53226033c80312ace
          WRITE_SIG_REF: write-ed25519-test
          OUTBOX_HMAC_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: lua5.4 scripts/verify/ingest_smoke.lua

      - name: Envelope guard
        env:
          WRITE_REQUIRE_SIGNATURE: 1
          WRITE_REQUIRE_SIGNATURE_POLICY: 0
          WRITE_SIG_TYPE: ed25519
          WRITE_SIG_PRIV_HEX: 4f3c5f2a0d1b4a8c9e6f7d2b3c4e5a6f7b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e
          WRITE_SIG_PUBLIC: hex:65c29ed7228fce639284da05d84fbc37ef736c44ddec2ce53226033c80312ace
          WRITE_SIG_REF: write-ed25519-test
        run: lua5.4 scripts/verify/envelope_guard.lua

      - name: JWT + signature interop
        env:
          WRITE_REQUIRE_SIGNATURE: 1
          WRITE_REQUIRE_SIGNATURE_POLICY: 0
          WRITE_SIG_TYPE: ed25519
          WRITE_SIG_PRIV_HEX: 4f3c5f2a0d1b4a8c9e6f7d2b3c4e5a6f7b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e
          WRITE_SIG_PUBLIC: hex:65c29ed7228fce639284da05d84fbc37ef736c44ddec2ce53226033c80312ace
          WRITE_SIG_REF: write-ed25519-test
          WRITE_REQUIRE_JWT: 1
          WRITE_JWT_HS_SECRET: 0123456789abcdef0123456789abcdef
        run: lua5.4 scripts/verify/jwt_signature_interop_spec.lua

      - name: Action validation
        env:
          WRITE_REQUIRE_SIGNATURE: 1
          WRITE_REQUIRE_SIGNATURE_POLICY: 0
          WRITE_SIG_TYPE: ed25519
          WRITE_SIG_PRIV_HEX: 4f3c5f2a0d1b4a8c9e6f7d2b3c4e5a6f7b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e
          WRITE_SIG_PUBLIC: hex:65c29ed7228fce639284da05d84fbc37ef736c44ddec2ce53226033c80312ace
          WRITE_SIG_REF: write-ed25519-test
        run: lua5.4 scripts/verify/action_validation.lua

      - name: Schema fallback behavior
        run: |
          lua5.4 scripts/verify/schema_fallback.lua
          WRITE_REQUIRE_ACTION_SCHEMA=1 lua5.4 scripts/verify/schema_fallback.lua

      - name: SignatureRef keyring routing
        env:
          WRITE_REQUIRE_SIGNATURE: 1
          WRITE_REQUIRE_SIGNATURE_POLICY: 0
          WRITE_SIG_TYPE: ecdsa
          WRITE_SIG_PUBLICS: tenant-a=key-a.pem,tenant-b=key-b.pem,default=default.pem
        run: lua5.4 scripts/verify/sig_publics_keyring.lua

      - name: Action validation (shipping/returns)
        env:
          WRITE_REQUIRE_SIGNATURE: 0
          WRITE_REQUIRE_NONCE: 0
          WRITE_REQUIRE_TIMESTAMP: 0
          WRITE_REQUIRE_JWT: 0
          WRITE_RL_MAX_REQUESTS: 100000
          WRITE_RL_CALLER_MAX: 100000
        run: lua5.4 scripts/verify/action_validation_shipping.lua

      - name: Auth scope/role strict matrix
        env:
          WRITE_REQUIRE_SIGNATURE: 0
          WRITE_REQUIRE_NONCE: 0
          WRITE_REQUIRE_TIMESTAMP: 0
          WRITE_REQUIRE_JWT: 0
          WRITE_ROLE_POLICY_STRICT: 1
          WRITE_RL_MAX_REQUESTS: 100000
          WRITE_RL_CALLER_MAX: 100000
        run: lua5.4 scripts/verify/auth_scope_matrix.lua

      - name: Persistence failure-mode matrix (wal/idempotency)
        env:
          WRITE_REQUIRE_SIGNATURE: 0
          WRITE_REQUIRE_NONCE: 0
          WRITE_REQUIRE_TIMESTAMP: 0
          WRITE_REQUIRE_JWT: 0
          WRITE_ROLE_POLICY_STRICT: 1
          WRITE_RL_MAX_REQUESTS: 100000
          WRITE_RL_CALLER_MAX: 100000
        run: |
          WRITE_WAL_PATH=/proc/1/wal.ndjson \
          PERSIST_FAIL_MODE=wal \
          lua5.4 scripts/verify/persistence_failure_modes.lua
          WRITE_IDEM_PATH=/proc/1/idem.json \
          PERSIST_FAIL_MODE=idem \
          lua5.4 scripts/verify/persistence_failure_modes.lua

      - name: Publish flow smoke
        env:
          WRITE_REQUIRE_SIGNATURE: 0
          WRITE_REQUIRE_NONCE: 0
          WRITE_REQUIRE_TIMESTAMP: 0
          WRITE_REQUIRE_JWT: 0
          WRITE_RL_MAX_REQUESTS: 100000
          WRITE_RL_CALLER_MAX: 100000
        run: lua5.4 scripts/verify/publish_flow.lua

      - name: Idempotency/replay smoke
        env:
          WRITE_REQUIRE_SIGNATURE: 0
          WRITE_REQUIRE_NONCE: 0
          WRITE_REQUIRE_TIMESTAMP: 0
          WRITE_REQUIRE_JWT: 0
          WRITE_RL_MAX_REQUESTS: 100000
          WRITE_RL_CALLER_MAX: 100000
        run: lua5.4 scripts/verify/idempotency_replay.lua

      - name: Metrics counters spec
        run: lua5.4 scripts/verify/metrics_counters_spec.lua

      - name: Conflict + replay/idempotency (end-to-end)
        env:
          WRITE_REQUIRE_SIGNATURE: 0
          WRITE_REQUIRE_NONCE: 0
          WRITE_REQUIRE_TIMESTAMP: 0
          WRITE_REQUIRE_JWT: 0
          WRITE_RL_MAX_REQUESTS: 100000
          WRITE_RL_CALLER_MAX: 100000
        run: |
          lua5.4 scripts/verify/conflicts.lua
          lua5.4 tests/security/hmac_replay.lua

      - name: Publish → outbox HMAC smoke
        env:
          WRITE_REQUIRE_SIGNATURE: 0
          WRITE_REQUIRE_NONCE: 0
          WRITE_REQUIRE_TIMESTAMP: 0
          WRITE_REQUIRE_JWT: 0
          WRITE_RL_MAX_REQUESTS: 100000
          WRITE_RL_CALLER_MAX: 100000
          OUTBOX_HMAC_SECRET: ${{ secrets.OUTBOX_HMAC_SECRET_TEST || secrets.OUTBOX_HMAC_SECRET || 'ci-placeholder' }}
          OUTBOX_SUPPRESS_HMAC_WARN: 1
        run: lua5.4 scripts/verify/publish_outbox_mock_ao.lua

      - name: JWT claim mapping spec (nightly)
        if: env.RUN_JWT_SPEC == '1'
        env:
          WRITE_REQUIRE_JWT: 1
          WRITE_JWT_HS_SECRET: 0123456789abcdef0123456789abcdef
        run: lua5.4 scripts/verify/jwt_actor_spec.lua

      - name: Rate store persistence spec (nightly)
        if: env.RUN_RATE_SPEC == '1'
        env:
          WRITE_RATE_STORE_PATH: ${{ env.WRITE_RATE_STORE_PATH }}
        run: lua5.4 scripts/verify/rate_store_spec.lua

      - name: Clear persisted rate-store after spec (nightly)
        if: env.RUN_RATE_SPEC == '1'
        run: |
          if [ -n "${WRITE_RATE_STORE_PATH:-}" ]; then
            rm -f "$WRITE_RATE_STORE_PATH" "$WRITE_RATE_STORE_PATH.tmp"
          fi

      - name: Bundle export (if export file present)
        env:
          WRITE_OUTBOX_EXPORT_PATH: ${{ env.WRITE_OUTBOX_EXPORT_PATH }}
        run: |
          mkdir -p artifacts
          EXPORT=${WRITE_OUTBOX_EXPORT_PATH:-dev/write-export.ndjson}
          if [ -f "${EXPORT}" ]; then
            WRITE_OUTBOX_EXPORT_PATH="$EXPORT" lua5.4 scripts/export/bundle_export.lua > artifacts/write-bundle.json
          else
            echo "WRITE_OUTBOX_EXPORT_PATH not found, skipping bundle export"
          fi

      - name: Secret scan (gitleaks)
        run: gitleaks detect --no-git -v

      - name: Checksum alert (wal/queue)
        run: bash scripts/verify/checksum_alert.sh

      - name: Upload bundle artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: write-bundle
          path: artifacts/write-bundle.json
          if-no-files-found: ignore
