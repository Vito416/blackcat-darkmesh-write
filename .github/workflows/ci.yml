name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * *" # nightly hardening run

permissions: { contents: read }

jobs:
  verify:
    name: Static checks
    runs-on: ubuntu-latest
    env:
      RUN_JWT_SPEC: ${{ github.event_name == 'schedule' && '1' || '' }}
      RUN_RATE_SPEC: ${{ github.event_name == 'schedule' && '1' || '' }}
      WRITE_RATE_STORE_PATH: ${{ github.event_name == 'schedule' && 'dev/write-rate-store.json' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Lua 5.4 + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            lua5.4 liblua5.4-dev luarocks \
            libssl-dev libsodium-dev libsqlite3-dev

      - name: Install rocks from lockfile
        run: |
          if [ -f ops/rocks.lock ]; then
            LUA_VER=5.4
            while read -r name version; do
              case "$name" in \#*|"") continue ;; esac
              if ! luarocks --lua-version=$LUA_VER install --local "$name" "$version"; then
                echo "lock install failed for $name $version; retrying latest" >&2
                luarocks --lua-version=$LUA_VER install --local "$name"
              fi
            done < ops/rocks.lock
            eval "$(luarocks --lua-version=$LUA_VER path)"
            echo "$HOME/.luarocks/bin" >> $GITHUB_PATH
            {
              echo "LUA_PATH=$LUA_PATH"
              echo "LUA_CPATH=$LUA_CPATH"
            } >> "$GITHUB_ENV"
          else
            echo "ops/rocks.lock missing" >&2
            exit 1
          fi

      - name: Install luacheck/stylua
        run: |
          if command -v luarocks >/dev/null 2>&1; then
            luarocks install --local luacheck || true
            luarocks install --local stylua || true
            echo "$HOME/.luarocks/bin" >> $GITHUB_PATH
          else
            echo "luarocks not installed; failing luacheck/stylua install" && exit 1
          fi

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.0
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Preflight (schemas + Lua syntax + fixtures)
        env:
          RUN_BATCH: 1
          RUN_DEPS_CHECK: 1
          WRITE_REQUIRE_SIGNATURE: 1  # ensure crypto deps present in CI
        run: bash scripts/verify/preflight.sh

      - name: Arweave hash verify (enforced on release)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main') && env.ARWEAVE_VERIFY_FILE != '' && env.ARWEAVE_VERIFY_TX != ''
        env:
          ARWEAVE_VERIFY_FILE: ${{ env.ARWEAVE_VERIFY_FILE }}
          ARWEAVE_VERIFY_TX: ${{ env.ARWEAVE_VERIFY_TX }}
        run: |
          scripts/verify/verify_arweave_hash.sh "$ARWEAVE_VERIFY_FILE" "$ARWEAVE_VERIFY_TX"

      - name: Arweave hash verify (optional)
        if: env.ARWEAVE_VERIFY_FILE != '' && env.ARWEAVE_VERIFY_TX != ''
        env:
          ARWEAVE_VERIFY_FILE: ${{ env.ARWEAVE_VERIFY_FILE }}
          ARWEAVE_VERIFY_TX: ${{ env.ARWEAVE_VERIFY_TX }}
        run: scripts/verify/verify_arweave_hash.sh "$ARWEAVE_VERIFY_FILE" "$ARWEAVE_VERIFY_TX"

      - name: Luacheck
        run: |
          if command -v luacheck >/dev/null 2>&1; then
            luacheck ao scripts
          else
            echo "luacheck missing" && exit 1
          fi

      - name: Stylua
        run: |
          if command -v stylua >/dev/null 2>&1; then
            stylua --check ao scripts
          else
            echo "stylua missing" && exit 1
          fi

      - name: Ingest smoke
        run: lua5.4 scripts/verify/ingest_smoke.lua

      - name: Envelope guard
        run: lua5.4 scripts/verify/envelope_guard.lua

      - name: Action validation
        run: lua5.4 scripts/verify/action_validation.lua

      - name: Action validation (shipping/returns)
        run: lua5.4 scripts/verify/action_validation_shipping.lua

      - name: Publish flow smoke
        run: lua5.4 scripts/verify/publish_flow.lua

      - name: Idempotency/replay smoke
        run: lua5.4 scripts/verify/idempotency_replay.lua

      - name: Conflict + replay/idempotency (end-to-end)
        run: |
          lua5.4 scripts/verify/conflicts.lua
          lua5.4 tests/security/hmac_replay.lua

      - name: Publish → outbox HMAC smoke
        env:
          OUTBOX_HMAC_SECRET: ${{ secrets.OUTBOX_HMAC_SECRET_TEST || secrets.OUTBOX_HMAC_SECRET || 'ci-placeholder' }}
        run: lua5.4 scripts/verify/publish_outbox_mock_ao.lua

      - name: JWT claim mapping spec (nightly)
        if: env.RUN_JWT_SPEC == '1'
        run: lua5.4 scripts/verify/jwt_actor_spec.lua

      - name: Rate store persistence spec (nightly)
        if: env.RUN_RATE_SPEC == '1'
        env:
          WRITE_RATE_STORE_PATH: ${{ env.WRITE_RATE_STORE_PATH }}
        run: lua5.4 scripts/verify/rate_store_spec.lua

      - name: Bundle export (if export file present)
        env:
          WRITE_OUTBOX_EXPORT_PATH: ${{ env.WRITE_OUTBOX_EXPORT_PATH }}
        run: |
          mkdir -p artifacts
          EXPORT=${WRITE_OUTBOX_EXPORT_PATH:-dev/write-export.ndjson}
          if [ -f "${EXPORT}" ]; then
            WRITE_OUTBOX_EXPORT_PATH="$EXPORT" lua5.4 scripts/export/bundle_export.lua > artifacts/write-bundle.json
          else
            echo "WRITE_OUTBOX_EXPORT_PATH not found, skipping bundle export"
          fi

      - name: Secret scan (gitleaks)
        run: gitleaks detect --no-git -v

      - name: Checksum alert (wal/queue)
        run: scripts/verify/checksum_alert.sh

      - name: Upload bundle artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: write-bundle
          path: artifacts/write-bundle.json
          if-no-files-found: ignore
